name: refresh

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DOL_LCA_URL: ${{ vars.DOL_LCA_URL }}
      KVK_API_KEY: ${{ secrets.KVK_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Ensure data directories
        run: mkdir -p data/company_lists data/raw data/processed

      - name: Validate DOL_LCA_URL
        run: |
          if [ -z "${DOL_LCA_URL}" ]; then
            echo "Repository variable DOL_LCA_URL is required."
            exit 1
          fi

      - name: Download LCA CSV
        run: curl -L "${DOL_LCA_URL}" -o data/company_lists/us_lca_raw.csv

      - name: Build US company list
        run: python scripts/build_us_companies.py

      - name: Scrape careers pages
        run: python scripts/scrape_careers.py

      - name: Clean postings
        run: python scripts/clean.py

      - name: Aggregate summary
        run: python scripts/aggregate.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git add data/summary.json data/processed data/raw data/company_lists
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Refresh job market data"
          git push
