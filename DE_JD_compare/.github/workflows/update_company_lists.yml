name: update_company_lists

on:
  schedule:
    - cron: "0 8 1 */3 *"
  workflow_dispatch:

jobs:
  update-company-lists:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      IND_REGISTER_URL: ${{ vars.IND_REGISTER_URL }}
      KVK_API_KEY: ${{ secrets.KVK_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure company list directory
        run: mkdir -p data/company_lists

      - name: Validate IND_REGISTER_URL
        run: |
          if [ -z "${IND_REGISTER_URL}" ]; then
            echo "Repository variable IND_REGISTER_URL is required."
            exit 1
          fi

      - name: Download IND register
        run: curl -L "${IND_REGISTER_URL}" -o data/company_lists/nl_ind_raw.xlsx

      - name: Build NL company list
        run: python scripts/build_nl_companies.py

      - name: Discover careers URLs
        run: python scripts/find_careers_pages.py

      - name: Commit updated company lists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git add data/company_lists
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Refresh company lists"
          git push
